<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎵 正在加载...</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .card {
    background: #1a1a1a;
    border-radius: 20px;
    padding: 36px;
    width: 340px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .art {
    width: 200px;
    height: 200px;
    border-radius: 12px;
    margin: 0 auto 24px;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 72px;
    overflow: hidden;
  }
  .art img { width:100%; height:100%; object-fit:cover; border-radius:12px; }
  .song { font-size: 22px; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
  .artist { font-size: 15px; color: #888; margin-bottom: 28px; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1DB954;
    color: #fff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 600;
    transition: opacity .2s;
  }
  .btn:hover { opacity: .85; }
  .status { margin-top: 20px; font-size: 12px; color: #444; }
</style>
</head>
<body>
<div class="card">
  <div class="art" id="art">🎵</div>
  <div class="song" id="song">加载中...</div>
  <div class="artist" id="artist"></div>
  <a class="btn" id="btn" href="https://open.spotify.com" target="_blank">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
    在 Spotify 打开
  </a>
  <div class="status" id="status"></div>
</div>
<script>
  const RAW = 'https://raw.githubusercontent.com/CrossingX/m/main/now.json';
  async function load() {
    try {
      const r = await fetch(RAW + '?t=' + Date.now());
      const d = await r.json();
      if (d.song && d.song !== '暂无播放') {
        document.title = '🎵 ' + d.song + ' - ' + d.artist;
        document.getElementById('song').textContent = d.song;
        document.getElementById('artist').textContent = d.artist;
        document.getElementById('btn').href = d.spotifyUrl || 'https://open.spotify.com';
        if (d.albumArt) {
          document.getElementById('art').innerHTML = '<img src="' + d.albumArt + '">';
        }
        if (d.updatedAt) {
          const t = new Date(d.updatedAt);
          document.getElementById('status').textContent = '更新于 ' + t.toLocaleTimeString('zh-CN');
        }
      } else {
        document.title = '🎵 暂无播放';
        document.getElementById('song').textContent = '暂无播放';
        document.getElementById('artist').textContent = '';
      }
    } catch(e) {
      document.getElementById('song').textContent = '加载失败';
    }
  }
  load();
  setInterval(load, 15000);
</script>
</body>
</html>
